name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Lint & type-check
  # ---------------------------------------------------------------------------
  quality-gates:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy src

  # ---------------------------------------------------------------------------
  # Stage 2: Run tests
  # ---------------------------------------------------------------------------
  tests:
    name: Tests
    runs-on: ubuntu-latest
    needs: quality-gates
    services:
      bookstore-server:
        image: python:3.12-slim
        # Server is started as a step instead (services need Docker images)
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Start mock server
        run: |
          uvicorn mock_server.server:app --host 0.0.0.0 --port 3000 &
          sleep 3
          curl --retry 5 --retry-delay 1 http://localhost:3000/health

      - name: Run tests
        run: pytest --alluredir=allure-results

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/

  # ---------------------------------------------------------------------------
  # Stage 3: Generate & deploy Allure report
  # ---------------------------------------------------------------------------
  allure-report:
    name: Allure Report
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (required by Allure CLI)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Allure CLI
        run: |
          curl -o allure.tgz -L https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tgz
          echo "$PWD/allure-2.27.0/bin" >> "$GITHUB_PATH"

      - name: Download Allure results artifact
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results/

      - name: Generate Allure report
        run: allure generate allure-results --clean -o allure-report

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
