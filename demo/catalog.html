<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookstore – Catalog</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header>
    <h1>Bookstore</h1>
    <nav>
      <a href="/catalog.html" data-testid="nav-catalog">Catalog</a>
      <a href="/cart.html" data-testid="nav-cart">
        Cart (<span data-testid="cart-counter">0</span>)
      </a>
      <a href="/orders.html">Orders</a>
    </nav>
  </header>
  <main>
    <h2 data-testid="dashboard-heading">Book Catalog</h2>
    <div class="filters">
      <div class="filter-group">
        <label>Search</label>
        <input type="text" data-testid="search-input" placeholder="Title or author…">
      </div>
      <div class="filter-group">
        <label>Category</label>
        <select data-testid="category-filter">
          <option value="">All Categories</option>
          <option value="Fiction">Fiction</option>
          <option value="Technology">Technology</option>
          <option value="Science">Science</option>
          <option value="History">History</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Sort</label>
        <select data-testid="sort-select">
          <option value="">Default</option>
          <option value="price_asc">Price: Low → High</option>
          <option value="price_desc">Price: High → Low</option>
        </select>
      </div>
      <button data-testid="search-submit">Search</button>
    </div>
    <p class="hidden" data-testid="no-results-message">No books found matching your criteria.</p>
    <ul class="book-list" data-testid="book-list"></ul>
  </main>
  <script src="/js/app.js"></script>
  <script>initCatalogPage();</script>
</body>
</html>
